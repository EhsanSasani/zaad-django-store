{% if breadcrumbs %}
<nav class="container breadcrumbs" aria-label="مسیر صفحه">
  <ol>
    {% for crumb in breadcrumbs %}
      <li>
        {% if crumb.url and not forloop.last %}
          <a href="{{ crumb.url }}">{{ crumb.name }}</a>
        {% else %}
          <span>{{ crumb.name }}</span>
        {% endif %}
      </li>
    {% endfor %}
  </ol>
</nav>
{% endif %}
