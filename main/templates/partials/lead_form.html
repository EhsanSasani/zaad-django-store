<section class="lead-box" id="lead-form">
  <div class="lead-head">
    <h2>{{ lead_title|default:"Request Guidance" }}</h2>
    <p>{{ lead_subtitle|default:"Leave a short request and the ZAAD team will coordinate with you." }}</p>
  </div>

  <form method="post" action="{% url 'lead_request' %}" class="lead-form" data-track-lead-form data-cta-position="{{ cta_position|default:'inline' }}" data-default-lead-type="{{ lead_default_type|default:'flower' }}">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.get_full_path }}">
    <input type="hidden" name="source_page" value="{{ request.path }}">

    <label>
      <span>Name</span>
      {{ lead_form.full_name }}
    </label>

    <label>
      <span>Mobile Number</span>
      {{ lead_form.mobile }}
    </label>

    <label>
      <span>Request Type</span>
      {{ lead_form.lead_type }}
    </label>

    <label>
      <span>Delivery Window</span>
      {{ lead_form.delivery_window }}
    </label>

    <label class="field-optional date-only">
      <span>Preferred Date</span>
      {{ lead_form.preferred_date }}
    </label>

    <label class="field-optional event-only">
      <span>Event Location</span>
      {{ lead_form.event_location }}
    </label>

    <label>
      <span>Short Note</span>
      {{ lead_form.note }}
    </label>

    <button type="submit" class="btn btn-call">Submit Request</button>
  </form>
</section>
