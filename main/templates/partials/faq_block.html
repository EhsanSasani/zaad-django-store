{% if faq_items %}
<section class="container section-block">
  <div class="section-head">
    <h2>{{ faq_title|default:"FAQ" }}</h2>
  </div>

  <div class="faq-grid">
    {% for item in faq_items %}
      <article>
        <h3>{{ item.question }}</h3>
        <p>{{ item.answer }}</p>
      </article>
    {% endfor %}
  </div>
</section>
{% endif %}
